name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: project-6ce813b2-674a-4d31-aad
  REGION: us-central1
  SERVICE: fitrx-backend
  IMAGE: us-central1-docker.pkg.dev/project-6ce813b2-674a-4d31-aad/cloud-run-source-deploy/backend

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/434489845366/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@project-6ce813b2-674a-4d31-aad.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: |
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            APP_VERSION=${{ github.sha }}
          secrets: |
            CLOUD_SQL_DSN=fitrx-cloud-sql-dsn:latest
            OPENAI_API_KEY=fitrx-openai-api-key:latest

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking $URL/health ..."
          for i in 1 2 3; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed — HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i failed (HTTP $STATUS) — retrying in 5s..."
            sleep 5
          done
          echo "Health check FAILED after 3 attempts"
          exit 1

      - name: Deployment summary
        run: |
          echo "### Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE }}:${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
